<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Aydın Gros – Mobil Kasiyer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --orange:#F97316;--orange-d:#EA6C10;
  --green:#16A34A;--red:#DC2626;
  --navy:#1C1917;--gray50:#F9FAFB;--gray100:#F3F4F6;
  --gray200:#E5E7EB;--gray500:#6B7280;--gray700:#374151;--white:#fff;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray50);color:var(--gray700);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.header{background:var(--navy);color:#fff;padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-size:16px;font-weight:700}
.header-badge{background:var(--orange);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
.offline-banner{background:#DC2626;color:#fff;text-align:center;font-size:12px;padding:4px;display:none}
.offline-banner.show{display:block}

/* SEARCH */
.search-wrap{padding:12px;background:#fff;border-bottom:1px solid var(--gray200);flex-shrink:0}
.search-row{display:flex;gap:8px}
.search-input{flex:1;padding:10px 14px;border:2px solid var(--gray200);border-radius:10px;font-size:15px;outline:none}
.search-input:focus{border-color:var(--orange)}
.scan-btn{padding:10px 14px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-size:18px;cursor:pointer}

/* PRODUCT GRID */
.products-wrap{flex:1;overflow-y:auto;padding:12px}
.cat-tabs{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.cat-tab{padding:6px 14px;border-radius:20px;border:1.5px solid var(--gray200);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;background:#fff;color:var(--gray500)}
.cat-tab.active{background:var(--orange);border-color:var(--orange);color:#fff}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.product-card{background:#fff;border-radius:12px;border:2px solid var(--gray200);padding:12px;cursor:pointer;transition:.1s;position:relative;active-color:var(--orange)}
.product-card:active{border-color:var(--orange);transform:scale(.97)}
.product-card.out-of-stock{opacity:.5;pointer-events:none}
.product-emoji{font-size:28px;text-align:center;margin-bottom:8px}
.product-name{font-size:12px;font-weight:600;color:var(--navy);line-height:1.3;margin-bottom:6px;min-height:32px}
.product-price{font-size:16px;font-weight:800;color:var(--orange)}
.product-stock{font-size:10px;color:var(--gray500);margin-top:2px}
.add-icon{position:absolute;top:8px;right:8px;background:var(--orange);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}

/* CART DRAWER */
.cart-toggle{position:fixed;bottom:calc(var(--safe-bot) + 16px);left:50%;transform:translateX(-50%);background:var(--orange);color:#fff;border:none;border-radius:30px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(249,115,22,.4);display:flex;align-items:center;gap:10px;z-index:50}
.cart-count{background:#fff;color:var(--orange);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}

/* CART SHEET */
.cart-sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.15);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:100;max-height:80dvh;display:flex;flex-direction:column;padding-bottom:var(--safe-bot)}
.cart-sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--gray200);border-radius:2px;margin:12px auto}
.sheet-title{padding:0 16px 12px;font-size:17px;font-weight:700;color:var(--navy)}
.cart-list{flex:1;overflow-y:auto;padding:0 16px}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray100)}
.cart-item-name{flex:1;font-size:14px;font-weight:600}
.cart-item-price{font-size:14px;font-weight:700;color:var(--orange);min-width:70px;text-align:right}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--gray200);background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.qty-btn:active{background:var(--gray100)}
.qty-num{min-width:24px;text-align:center;font-weight:700;font-size:15px}

/* CHECKOUT */
.checkout-wrap{padding:12px 16px;border-top:1px solid var(--gray100)}
.checkout-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px}
.checkout-total{font-size:20px;font-weight:800;color:var(--navy)}
.coupon-row{display:flex;gap:8px;margin-bottom:10px}
.coupon-input{flex:1;padding:8px 12px;border:1.5px solid var(--gray200);border-radius:8px;font-size:13px;outline:none}
.coupon-input:focus{border-color:var(--orange)}
.coupon-apply-btn{padding:8px 14px;background:var(--gray100);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.payment-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pay-btn{padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.pay-btn.cash{background:var(--green);color:#fff}
.pay-btn.card{background:var(--navy);color:#fff}
.pay-btn:active{opacity:.85}

/* RECEIPT MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:90dvh;overflow-y:auto;padding:20px 20px calc(20px + var(--safe-bot))}
.receipt{font-family:'Courier New',monospace;font-size:13px;max-width:300px;margin:0 auto}
.receipt-line{border-top:1px dashed #ccc;margin:8px 0}
.receipt h3{text-align:center;font-size:15px;margin-bottom:4px}
.receipt p{text-align:center;color:var(--gray500);font-size:11px;margin-bottom:12px}
.receipt-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.receipt-total{font-weight:700;font-size:15px}
.modal-close{display:block;width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px}
.print-btn{display:block;width:100%;padding:14px;background:var(--gray100);color:var(--gray700);border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
#loader span{font-size:32px}
#loader p{color:rgba(255,255,255,.7);font-size:14px}
</style>
</head>
<body>

<div id="loader">
  <span>🛒</span>
  <p>Yükleniyor…</p>
</div>

<div class="offline-banner" id="offlineBanner">📡 Çevrimdışı mod — Satışlar internet gelince senkronize edilecek</div>

<div class="header">
  <div class="header-title">🛒 Mobil Kasiyer</div>
  <div class="header-badge" id="branchBadge">Şube 1</div>
</div>

<div class="search-wrap">
  <div class="search-row">
    <input type="search" class="search-input" id="searchInput" placeholder="Ürün ara veya barkod gir…" autocomplete="off" inputmode="search">
    <button class="scan-btn" id="scanBtn" title="Barkod Tara">📷</button>
  </div>
</div>

<div class="products-wrap">
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" onclick="filterCat('')">Tümü</button>
  </div>
  <div class="product-grid" id="productGrid"></div>
</div>

<button class="cart-toggle" id="cartToggle" onclick="openCart()">
  🛒 Sepet
  <span class="cart-count" id="cartCount">0</span>
  <span id="cartTotal">₺0,00</span>
</button>

<!-- CART SHEET -->
<div class="cart-sheet" id="cartSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Sepet</div>
  <div class="cart-list" id="cartList"></div>
  <div class="checkout-wrap">
    <div class="checkout-row">
      <span>Ara toplam</span>
      <span id="subtotalLabel">₺0,00</span>
    </div>
    <div class="checkout-row" id="discountRow" style="display:none;color:var(--green)">
      <span>İndirim</span>
      <span id="discountLabel">-₺0,00</span>
    </div>
    <div class="checkout-row">
      <span class="checkout-total">Toplam</span>
      <span class="checkout-total" id="totalLabel">₺0,00</span>
    </div>
    <div class="coupon-row">
      <input type="text" class="coupon-input" id="couponInput" placeholder="Kupon kodu" maxlength="12">
      <button class="coupon-apply-btn" onclick="applyCoupon()">Uygula</button>
    </div>
    <div class="payment-btns">
      <button class="pay-btn cash" onclick="checkout('cash')">💵 Nakit</button>
      <button class="pay-btn card" onclick="checkout('card')">💳 Kart</button>
      <button class="pay-btn" style="background:var(--navy);color:#fff;font-size:13px" onclick="openMixedPayModal()">🔀 Karma</button>
    </div>
  </div>
</div>

<!-- KARMA ÖDEME MODAL -->
<div class="modal" id="mixedPayModal">
  <div class="modal-box">
    <h3 style="margin:0 0 16px;font-size:16px;font-weight:700">🔀 Karma Ödeme</h3>
    <div id="mixedPayTotal" style="font-size:22px;font-weight:800;color:var(--navy);text-align:center;margin-bottom:16px">₺0,00</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">💵 Nakit (₺)</label>
        <input type="number" id="mixedCash" step="0.01" min="0" placeholder="0.00"
          style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:16px"
          oninput="calcMixedChange()">
      </div>
      <div>
        <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">💳 Kart (₺)</label>
        <input type="number" id="mixedCard" step="0.01" min="0" placeholder="0.00"
          style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:16px"
          oninput="calcMixedChange()">
      </div>
    </div>
    <div id="mixedChangeInfo" style="text-align:center;font-size:14px;color:#444;margin-bottom:16px;min-height:20px"></div>
    <button onclick="checkoutMixed()" style="width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px">
      ✅ Ödemeyi Tamamla
    </button>
    <button class="modal-close" onclick="closeMixedPayModal()">İptal</button>
  </div>
</div>

<!-- İADE MODAL -->
<div class="modal" id="refundPosModal">
  <div class="modal-box">
    <h3 style="margin:0 0 12px;font-size:16px;font-weight:700">↩️ Son Siparişi İptal Et</h3>
    <div id="refundPosInfo" style="background:#f5f5f5;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px"></div>
    <div>
      <label style="font-size:12px;color:#666;display:block;margin-bottom:4px">İptal Sebebi</label>
      <input type="text" id="refundPosReason" placeholder="Müşteri talebi, hatalı ürün…"
        style="width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px">
    </div>
    <button onclick="confirmPosRefund()" style="width:100%;padding:14px;background:#e53935;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;margin-bottom:8px">
      ↩️ İptal Et ve İade Yap
    </button>
    <button class="modal-close" onclick="closeRefundPosModal()">Vazgeç</button>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div class="modal" id="receiptModal">
  <div class="modal-box">
    <div class="receipt" id="receiptContent"></div>
    <button class="print-btn" onclick="printReceipt()">🖨️ Fişi Yazdır (ESC/POS)</button>
    <button onclick="openRefundFromReceipt()" style="width:100%;padding:12px;background:#fff3e0;color:#e65100;border:1.5px solid #e65100;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px">
      ↩️ Bu Siparişi İptal Et / İade
    </button>
    <button class="modal-close" onclick="closeReceipt()">✅ Yeni Satış</button>
  </div>
</div>

<script>
let sb = null;

const DB_NAME = 'aydin_pos_offline';
const DB_VER = 1;
let db = null;
let products = [];
let filteredProducts = [];
let cart = [];
let categories = [];
let activeCat = '';
let discount = 0;
let appliedCoupon = null;
let isOnline = navigator.onLine;

// ── IndexedDB setup ──
async function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('products')) d.createObjectStore('products', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('pending_sales')) d.createObjectStore('pending_sales', { keyPath: 'id', autoIncrement: true });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = reject;
  });
}

async function idbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}

async function idbPut(store, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val);
    req.onsuccess = res;
    req.onerror = rej;
  });
}

async function idbDelete(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = res;
    req.onerror = rej;
  });
}

// ── Network detection ──
window.addEventListener('online', () => { isOnline = true; document.getElementById('offlineBanner').classList.remove('show'); syncPendingSales(); });
window.addEventListener('offline', () => { isOnline = false; document.getElementById('offlineBanner').classList.add('show'); });

// ── Load products ──
async function loadProducts() {
  if (isOnline) {
    try {
      const res = await fetch('/api/db?coll=products');
      const data = await res.json();
      if (Array.isArray(data)) {
        products = data;
        for (const p of products) await idbPut('products', p);
      }
    } catch(e) {
      products = await idbGetAll('products');
    }
  } else {
    products = await idbGetAll('products');
  }

  categories = [...new Set(products.map(p => p.category || p.cat || '').filter(Boolean))];
  renderCatTabs();
  renderProducts();
}

function renderCatTabs() {
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = `<button class="cat-tab ${activeCat===''?'active':''}" onclick="filterCat('')">Tümü</button>`;
  categories.forEach(c => {
    tabs.innerHTML += `<button class="cat-tab ${activeCat===c?'active':''}" onclick="filterCat('${c}')">${c}</button>`;
  });
}

function filterCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderProducts();
}

function renderProducts(query = '') {
  const q = query.toLowerCase();
  filteredProducts = products.filter(p => {
    const matchCat = !activeCat || (p.category || p.cat || '') === activeCat;
    const matchQ = !q || (p.name || '').toLowerCase().includes(q) || String(p.id).includes(q);
    return matchCat && matchQ;
  });

  const grid = document.getElementById('productGrid');
  if (!filteredProducts.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray500)">Ürün bulunamadı</div>`;
    return;
  }

  grid.innerHTML = filteredProducts.map(p => `
    <div class="product-card" onclick="addToCart(${p.id})">
      <div class="add-icon">+</div>
      <div class="product-emoji">${p.emoji || '📦'}</div>
      <div class="product-name">${esc(p.name)}</div>
      <div class="product-price">₺${fmt(p.price)}</div>
      <div class="product-stock">Stok: ${p.stock ?? '—'}</div>
    </div>
  `).join('');
}

// ── Cart ──
function addToCart(productId) {
  const p = products.find(x => x.id == productId);
  if (!p) return;
  const existing = cart.find(i => i.id == productId);
  if (existing) existing.qty++;
  else cart.push({ id: p.id, name: p.name, price: p.price, qty: 1, emoji: p.emoji || '📦' });
  updateCartUI();
  pulseToggle();
}

function removeFromCart(productId) {
  const idx = cart.findIndex(i => i.id == productId);
  if (idx < 0) return;
  if (cart[idx].qty > 1) cart[idx].qty--;
  else cart.splice(idx, 1);
  updateCartUI();
}

function updateCartUI() {
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const finalTotal = Math.max(0, total - discount);
  const count = cart.reduce((s, i) => s + i.qty, 0);

  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotal').textContent = '₺' + fmt(finalTotal);
  document.getElementById('subtotalLabel').textContent = '₺' + fmt(total);
  document.getElementById('totalLabel').textContent = '₺' + fmt(finalTotal);

  if (discount > 0) {
    document.getElementById('discountRow').style.display = 'flex';
    document.getElementById('discountLabel').textContent = '-₺' + fmt(discount);
  } else {
    document.getElementById('discountRow').style.display = 'none';
  }

  const list = document.getElementById('cartList');
  if (!cart.length) {
    list.innerHTML = '<div style="text-align:center;padding:32px;color:var(--gray500)">Sepet boş</div>';
    return;
  }
  list.innerHTML = cart.map(i => `
    <div class="cart-item">
      <span style="font-size:20px">${i.emoji}</span>
      <div class="cart-item-name">${esc(i.name)}</div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="removeFromCart(${i.id})">−</button>
        <span class="qty-num">${i.qty}</span>
        <button class="qty-btn" onclick="addToCart(${i.id})">+</button>
      </div>
      <div class="cart-item-price">₺${fmt(i.price * i.qty)}</div>
    </div>
  `).join('');
}

function openCart() { document.getElementById('cartSheet').classList.add('open'); }
function closeCart() { document.getElementById('cartSheet').classList.remove('open'); }

document.addEventListener('click', e => {
  const sheet = document.getElementById('cartSheet');
  if (sheet.classList.contains('open') && !sheet.contains(e.target) && !document.getElementById('cartToggle').contains(e.target)) closeCart();
});

function pulseToggle() {
  const btn = document.getElementById('cartToggle');
  btn.style.transform = 'translateX(-50%) scale(1.08)';
  setTimeout(() => btn.style.transform = 'translateX(-50%) scale(1)', 150);
}

// ── Coupon ──
async function applyCoupon() {
  const code = document.getElementById('couponInput').value.trim();
  if (!code) return;

  if (!isOnline) { alert('Kupon doğrulaması için internet bağlantısı gerekli'); return; }

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const res = await fetch(`/api/coupons?code=${encodeURIComponent(code)}`);
  const data = await res.json();

  if (!data.valid) { alert('Geçersiz kupon: ' + data.error); return; }

  const c = data.coupon;
  if (c.min_order_total && total < c.min_order_total) {
    alert(`Bu kupon için minimum sipariş tutarı: ₺${fmt(c.min_order_total)}`);
    return;
  }

  appliedCoupon = c;
  if (c.type === 'percentage') discount = total * (c.value / 100);
  else if (c.type === 'fixed') discount = Math.min(c.value, total);

  updateCartUI();
  alert(`✅ Kupon uygulandı! ₺${fmt(discount)} indirim`);
}

// ── Checkout ──
async function checkout(paymentMethod) {
  if (!cart.length) { alert('Sepet boş'); return; }

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const finalTotal = Math.max(0, total - discount);

  const order = {
    id: 'POS_' + Date.now(),
    items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
    total: finalTotal,
    subtotal: total,
    discount,
    coupon_code: appliedCoupon?.code,
    payment_method: paymentMethod,
    status: 'completed',
    created_at: new Date().toISOString(),
    source: 'mobile_pos',
  };

  if (isOnline) {
    try {
      await fetch('/api/db?coll=orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order),
      });
      if (appliedCoupon) {
        await fetch('/api/coupons', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'apply', code: appliedCoupon.code, order_total: finalTotal, order_id: order.id }),
        });
      }
    } catch(e) {
      await savePendingSale(order);
    }
  } else {
    await savePendingSale(order);
  }

  showReceipt(order, paymentMethod);
  cart = [];
  discount = 0;
  appliedCoupon = null;
  document.getElementById('couponInput').value = '';
  closeCart();
  updateCartUI();
}

async function savePendingSale(order) {
  await idbPut('pending_sales', { ...order, _offline: true });
}

async function syncPendingSales() {
  const pending = await idbGetAll('pending_sales');
  for (const sale of pending) {
    try {
      await fetch('/api/db?coll=orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(sale),
      });
      await idbDelete('pending_sales', sale.id);
    } catch(e) { break; }
  }
}

// ── Receipt ──
function showReceipt(order, method) {
  lastOrderForRefund = order;
  const now = new Date();
  const dateStr = now.toLocaleDateString('tr-TR') + ' ' + now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const methodStr = method === 'cash' ? 'Nakit' : method === 'card' ? 'Kart' : method === 'karma' ? 'Karma' : method;

  let html = `
    <h3>🏪 AYDIN GROS</h3>
    <p>Hızlı ve Güvenilir Alışveriş</p>
    <div class="receipt-line"></div>
    <div class="receipt-row"><span>Tarih:</span><span>${dateStr}</span></div>
    <div class="receipt-row"><span>Fiş No:</span><span>${order.id.slice(-6)}</span></div>
    <div class="receipt-row"><span>Ödeme:</span><span>${methodStr}</span></div>
    <div class="receipt-line"></div>
  `;

  order.items.forEach(i => {
    html += `<div class="receipt-row"><span>${esc(i.name)} x${i.qty}</span><span>₺${fmt(i.price * i.qty)}</span></div>`;
  });

  html += `<div class="receipt-line"></div>`;
  if (order.discount > 0) {
    html += `<div class="receipt-row"><span>Ara Toplam</span><span>₺${fmt(order.subtotal)}</span></div>`;
    html += `<div class="receipt-row" style="color:var(--green)"><span>İndirim</span><span>-₺${fmt(order.discount)}</span></div>`;
  }
  html += `<div class="receipt-row receipt-total"><span>TOPLAM</span><span>₺${fmt(order.total)}</span></div>`;
  html += `<div class="receipt-line"></div><p style="margin-top:8px">Teşekkür ederiz! 🙏</p>`;

  document.getElementById('receiptContent').innerHTML = html;
  document.getElementById('receiptModal').classList.add('open');
}

function closeReceipt() {
  document.getElementById('receiptModal').classList.remove('open');
  updateCartUI();
}

// ── İADE (POS ekranından) ───────────────────────────────────────────────────
let lastOrderForRefund = null;

function openRefundFromReceipt() {
  if (!lastOrderForRefund) return;
  const o = lastOrderForRefund;
  document.getElementById('refundPosInfo').innerHTML = `
    <strong>Sipariş:</strong> ${String(o.id).slice(0,20)}<br>
    <strong>Tutar:</strong> ₺${fmt(o.total)}<br>
    <strong>Ürünler:</strong> ${(o.items || []).map(i => `${i.qty}× ${i.name}`).join(', ')}
  `;
  document.getElementById('refundPosReason').value = '';
  document.getElementById('receiptModal').classList.remove('open');
  document.getElementById('refundPosModal').classList.add('open');
}
function closeRefundPosModal() { document.getElementById('refundPosModal').classList.remove('open'); }

async function confirmPosRefund() {
  if (!lastOrderForRefund) return;
  const reason = document.getElementById('refundPosReason').value.trim() || 'POS iptali';
  try {
    const res = await fetch('/api/refunds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'cancel_order', order_id: lastOrderForRefund.id, reason }),
    });
    const data = await res.json();
    if (data.ok) {
      closeRefundPosModal();
      showToastPOS(`✅ İptal edildi — İade No: ${data.return_no}`);
      lastOrderForRefund = null;
    } else { showToastPOS(data.error || 'İptal hatası', true); }
  } catch(e) { showToastPOS('Bağlantı hatası: ' + e.message, true); }
}

// ── KARMA ÖDEME ──────────────────────────────────────────────────────────────
function openMixedPayModal() {
  const total = getCartTotal();
  if (total <= 0 || cart.length === 0) { showToastPOS('Sepet boş', true); return; }
  document.getElementById('mixedPayTotal').textContent = '₺' + fmt(total);
  document.getElementById('mixedCash').value = '';
  document.getElementById('mixedCard').value = '';
  document.getElementById('mixedChangeInfo').textContent = '';
  document.getElementById('mixedPayModal').classList.add('open');
}
function closeMixedPayModal() { document.getElementById('mixedPayModal').classList.remove('open'); }

function calcMixedChange() {
  const total = getCartTotal();
  const cash = parseFloat(document.getElementById('mixedCash').value) || 0;
  const card = parseFloat(document.getElementById('mixedCard').value) || 0;
  const paid = cash + card;
  const change = paid - total;
  const info = document.getElementById('mixedChangeInfo');
  if (paid <= 0) { info.textContent = ''; return; }
  if (paid < total) {
    info.innerHTML = `<span style="color:#e53935">Eksik ödeme: ₺${fmt(total - paid)}</span>`;
  } else if (change > 0) {
    info.innerHTML = `<span style="color:green">Para üstü: ₺${fmt(change)}</span>`;
  } else {
    info.innerHTML = `<span style="color:green">Tam ödeme ✓</span>`;
  }
}

function getCartTotal() {
  const sub = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const disc = appliedCoupon ? (appliedCoupon.discount_type === 'percentage'
    ? sub * appliedCoupon.discount_value / 100
    : appliedCoupon.discount_value) : 0;
  return Math.max(0, sub - disc);
}

async function checkoutMixed() {
  const cash = parseFloat(document.getElementById('mixedCash').value) || 0;
  const card = parseFloat(document.getElementById('mixedCard').value) || 0;
  const total = getCartTotal();
  if (cash + card < total - 0.01) { showToastPOS('Eksik ödeme', true); return; }
  closeMixedPayModal();
  const orderId = 'ord_' + Date.now();
  const payments = [];
  if (cash > 0) payments.push({ method: 'cash', amount: cash });
  if (card > 0) payments.push({ method: 'card', amount: card });
  try {
    const res = await fetch('/api/payments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ order_id: orderId, order_total: total, payments, items: cart }),
    });
    const data = await res.json();
    if (data.ok) {
      const order = { id: orderId, total, items: [...cart], payment_method: 'mixed', payments };
      lastOrderForRefund = order;
      showReceipt(order, 'karma');
      cart = [];
      appliedCoupon = null;
      document.getElementById('couponInput').value = '';
      updateCartUI();
    } else { showToastPOS(data.error || 'Ödeme hatası', true); }
  } catch(e) { showToastPOS('Bağlantı hatası', true); }
}

function showToastPOS(msg, isError = false) {
  let t = document.getElementById('posToast');
  if (!t) { t = document.createElement('div'); t.id = 'posToast'; t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;pointer-events:none;transition:opacity .3s'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.background = isError ? '#e53935' : '#333';
  t.style.color = '#fff';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

function fmt(n) { return Number(n||0).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function printReceipt() {
  // ESC/POS via Web Serial API (if supported) or print dialog
  if ('serial' in navigator) {
    alert('ESC/POS yazıcı bağlantısı için tarayıcı üzerinden seri port seçin (Chrome 89+)');
  } else {
    window.print();
  }
}

// ── Barcode scanner (keyboard wedge / camera) ──
let barcodeBuffer = '';
let barcodeTimer = null;

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && barcodeBuffer.length > 3) {
    handleBarcode(barcodeBuffer);
    barcodeBuffer = '';
    return;
  }
  if (e.key.length === 1) {
    barcodeBuffer += e.key;
    clearTimeout(barcodeTimer);
    barcodeTimer = setTimeout(() => barcodeBuffer = '', 200);
  }
});

async function handleBarcode(code) {
  const res = await fetch(`/api/barcode?barcode=${encodeURIComponent(code)}`);
  const data = await res.json();
  if (data.found) {
    const p = products.find(x => x.id == data.product_legacy_id);
    if (p) { addToCart(p.id); return; }
  }
  document.getElementById('searchInput').value = code;
  renderProducts(code);
}

document.getElementById('searchInput').addEventListener('input', e => renderProducts(e.target.value));

// Camera barcode scan (placeholder — requires BarcodeDetector API)
document.getElementById('scanBtn').addEventListener('click', async () => {
  const input = document.getElementById('searchInput');
  if ('BarcodeDetector' in window) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      alert('Kamera tarama özelliği yakında eklenecek');
      stream.getTracks().forEach(t => t.stop());
    } catch(e) {
      alert('Kamera erişimi reddedildi');
    }
  } else {
    input.focus();
    alert('Barkod okuyucuyu bağlayın ve kodu bu alana okutun');
  }
});

// ── Helpers ──
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n) { return Number(n).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

// ── Init ──
(async () => {
  try {
    const confRes = await fetch('/api/config');
    const conf = await confRes.json();
    sb = supabase.createClient(conf.url || conf.SUPABASE_URL, conf.anonKey || conf.SUPABASE_ANON_KEY);
  } catch(e) {
    console.error("Config load failed", e);
  }
  db = await openDB();
  if (!isOnline) document.getElementById('offlineBanner').classList.add('show');
  await loadProducts();
  document.getElementById('loader').style.display = 'none';
  await syncPendingSales();
})();

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
